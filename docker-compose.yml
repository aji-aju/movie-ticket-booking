services:
  postgres:
    image: postgres:16
    container_name: movie-postgres
    environment:
      POSTGRES_DB: moviebooking
      POSTGRES_USER: movie
      POSTGRES_PASSWORD: movie
    ports:
      - "5432:5432"
    volumes:
      - movie-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U movie -d moviebooking"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  movie-pgdata:
